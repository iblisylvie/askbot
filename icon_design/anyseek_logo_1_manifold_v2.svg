<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainPath" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#E07A5F;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 散沙：真正随机分布，无明显轮廓 -->
  <g fill="#E07A5F">
    <!-- 左上区域 -->
    <circle cx="25" cy="35" r="1.8" opacity="0.35"/>
    <circle cx="42" cy="28" r="1.2" opacity="0.28"/>
    <circle cx="18" cy="55" r="1.5" opacity="0.32"/>
    <circle cx="38" cy="68" r="1" opacity="0.25"/>
    <circle cx="15" cy="80" r="1.3" opacity="0.3"/>
    <circle cx="55" cy="22" r="1.6" opacity="0.38"/>
    <circle cx="30" cy="95" r="1.1" opacity="0.27"/>
    <circle cx="12" cy="110" r="1.4" opacity="0.33"/>
    <circle cx="48" cy="115" r="0.9" opacity="0.22"/>
    <circle cx="22" cy="130" r="1.2" opacity="0.29"/>
    <circle cx="65" cy="38" r="1" opacity="0.24"/>
    <circle cx="8" cy="145" r="1.5" opacity="0.31"/>

    <!-- 右上区域 -->
    <circle cx="140" cy="25" r="1.6" opacity="0.36"/>
    <circle cx="165" cy="35" r="1.2" opacity="0.27"/>
    <circle cx="180" cy="50" r="1.8" opacity="0.4"/>
    <circle cx="155" cy="15" r="1.1" opacity="0.26"/>
    <circle cx="190" cy="75" r="1.4" opacity="0.33"/>
    <circle cx="145" cy="55" r="1" opacity="0.23"/>
    <circle cx="175" cy="95" r="1.3" opacity="0.3"/>
    <circle cx="188" cy="115" r="1" opacity="0.25"/>
    <circle cx="160" cy="125" r="1.5" opacity="0.34"/>
    <circle cx="135" cy="42" r="0.9" opacity="0.21"/>
    <circle cx="195" cy="30" r="1.2" opacity="0.28"/>

    <!-- 左下区域 -->
    <circle cx="35" cy="150" r="1.4" opacity="0.32"/>
    <circle cx="18" cy="165" r="1.1" opacity="0.26"/>
    <circle cx="52" cy="175" r="1.6" opacity="0.37"/>
    <circle cx="28" cy="185" r="1" opacity="0.24"/>
    <circle cx="45" cy="140" r="1.3" opacity="0.29"/>
    <circle cx="10" cy="175" r="0.9" opacity="0.22"/>
    <circle cx="68" cy="158" r="1.2" opacity="0.31"/>
    <circle cx="5" cy="100" r="1" opacity="0.23"/>

    <!-- 右下区域 -->
    <circle cx="150" cy="165" r="1.5" opacity="0.33"/>
    <circle cx="175" cy="150" r="1.1" opacity="0.28"/>
    <circle cx="185" cy="175" r="1.4" opacity="0.35"/>
    <circle cx="165" cy="188" r="1" opacity="0.25"/>
    <circle cx="140" cy="155" r="1.3" opacity="0.3"/>
    <circle cx="190" cy="140" r="0.9" opacity="0.21"/>
    <circle cx="158" cy="145" r="1.2" opacity="0.27"/>
    <circle cx="182" cy="195" r="1" opacity="0.24"/>

    <!-- 中心区域的散点 -->
    <circle cx="75" cy="55" r="1.1" opacity="0.26"/>
    <circle cx="115" cy="48" r="1.4" opacity="0.32"/>
    <circle cx="95" cy="72" r="1" opacity="0.23"/>
    <circle cx="125" cy="82" r="1.2" opacity="0.28"/>
    <circle cx="85" cy="95" r="0.9" opacity="0.22"/>
    <circle cx="110" cy="108" r="1.3" opacity="0.3"/>
    <circle cx="70" cy="118" r="1" opacity="0.25"/>
    <circle cx="135" cy="115" r="1.1" opacity="0.27"/>
    <circle cx="90" cy="138" r="1.4" opacity="0.33"/>
    <circle cx="120" cy="145" r="1" opacity="0.24"/>
    <circle cx="105" cy="158" r="1.2" opacity="0.29"/>
  </g>

  <!-- 其他潜在流形结构（淡色）-->
  <!-- 流形A：波浪线 -->
  <path d="M 20 80
           Q 50 60, 80 90
           T 140 85
           T 180 110"
        fill="none"
        stroke="#E07A5F"
        stroke-width="2"
        opacity="0.2"
        stroke-linecap="round"/>

  <!-- 流形B：弧线 -->
  <path d="M 30 140
           Q 70 110, 110 130
           T 170 95"
        fill="none"
        stroke="#E07A5F"
        stroke-width="1.5"
        opacity="0.15"
        stroke-linecap="round"/>

  <!-- 流形C：折线 -->
  <path d="M 50 40
           L 80 70
           L 100 50
           L 140 80
           L 160 55"
        fill="none"
        stroke="#E07A5F"
        stroke-width="1.5"
        opacity="0.18"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- 流形D：另一条S线 -->
  <path d="M 25 120
           Q 60 100, 90 135
           T 150 150"
        fill="none"
        stroke="#E07A5F"
        stroke-width="2"
        opacity="0.12"
        stroke-linecap="round"/>

  <!-- 流形E：底部弧线 -->
  <path d="M 40 170
           Q 100 140, 160 165"
        fill="none"
        stroke="#E07A5F"
        stroke-width="2"
        opacity="0.15"
        stroke-linecap="round"/>

  <!-- 主路径：我正在寻找的那条流形（更醒目）-->
  <path d="M 35 60
           Q 55 55, 70 75
           S 95 105, 85 125
           S 110 150, 145 155
           S 175 135, 165 110"
        fill="none"
        stroke="url(#mainPath)"
        stroke-width="4"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- 主路径上的节点：关键发现点 -->
  <circle cx="35" cy="60" r="5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="70" cy="75" r="3.5" fill="#E07A5F" opacity="0.85"/>
  <circle cx="85" cy="125" r="4" fill="#E07A5F" opacity="0.9"/>
  <circle cx="145" cy="155" r="3.5" fill="#E07A5F" opacity="0.85"/>
  <circle cx="165" cy="110" r="5" fill="#E07A5F" opacity="0.95"/>
</svg>