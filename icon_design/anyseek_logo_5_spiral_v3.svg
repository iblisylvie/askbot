    <path d="M 160 160
             C 160 120, 120 80, 80 80
             S 20 120, 40 150
             S 100 160, 110 130
             S 85 95, 65 105
             S 55 135, 75 140
             S 95 125, 88 115
             S 70 115, 75 125"
          fill="none"
          stroke="url(#spiralGradV2)"
          stroke-width="4.5"
          stroke-linecap="round"/>
