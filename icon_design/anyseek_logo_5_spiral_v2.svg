<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spiralGradV2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#E07A5F;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glowSpiralV2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

