  <!-- 其他潜在螺线（淡色） -->
  <path d="M 165 125
           C 155 105, 135 95, 120 100
           S 100 120, 110 135
           S 140 148, 155 138"
        fill="none"
        stroke="#E07A5F"
        stroke-width="1.5"
        opacity="0.12"
        stroke-linecap="round"/>

  <path d="M 55 155
           C 65 135, 90 125, 105 135
           S 118 160, 102 168"
        fill="none"
        stroke="#E07A5F"
        stroke-width="1.5"
        opacity="0.14"
        stroke-linecap="round"/>

  <path d="M 155 85
           C 145 105, 125 115, 112 108
           S 98 85, 108 72"
        fill="none"
        stroke="#E07A5F"
        stroke-width="1.5"
        opacity="0.1"
        stroke-linecap="round"/>

  <!-- 主黄金螺线 -->
  <g filter="url(#glowSpiralV2)">
    <path d="M 160 160
             C 160 120, 120 80, 80 80
             S 20 120, 40 150
             S 100 160, 110 130
             S 85 95, 65 105
             S 55 135, 75 140
             S 95 125, 88 115
             S 70 115, 75 125"
          fill="none"
          stroke="url(#spiralGradV2)"
          stroke-width="4.5"
          stroke-linecap="round"/>
  </g>

