<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glowHex">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 散沙：随机分布 -->
  <g fill="#E07A5F" opacity="0.35">
    <circle cx="25" cy="40" r="1.5" opacity="0.3"/>
    <circle cx="18" cy="70" r="1.2" opacity="0.25"/>
    <circle cx="35" cy="25" r="1.3" opacity="0.28"/>
    <circle cx="45" cy="55" r="1" opacity="0.22"/>
    <circle cx="15" cy="100" r="1.4" opacity="0.32"/>
    <circle cx="30" cy="130" r="1.1" opacity="0.26"/>
    <circle cx="20" cy="160" r="1.2" opacity="0.29"/>
    <circle cx="50" cy="175" r="1.3" opacity="0.31"/>

    <circle cx="170" cy="35" r="1.4" opacity="0.33"/>
    <circle cx="185" cy="65" r="1.1" opacity="0.27"/>
    <circle cx="160" cy="20" r="1.2" opacity="0.3"/>
    <circle cx="180" cy="95" r="1" opacity="0.24"/>
    <circle cx="175" cy="130" r="1.3" opacity="0.28"/>
    <circle cx="185" cy="160" r="1.1" opacity="0.25"/>
    <circle cx="165" cy="180" r="1.2" opacity="0.3"/>

    <circle cx="80" cy="30" r="1" opacity="0.23"/>
    <circle cx="120" cy="22" r="1.2" opacity="0.27"/>
    <circle cx="100" cy="45" r="0.9" opacity="0.21"/>
    <circle cx="140" cy="48" r="1.1" opacity="0.26"/>
    <circle cx="70" cy="168" r="1" opacity="0.22"/>
    <circle cx="130" cy="175" r="1.2" opacity="0.29"/>
    <circle cx="100" cy="160" r="0.9" opacity="0.24"/>
    <circle cx="155" cy="148" r="1" opacity="0.26"/>

    <circle cx="75" cy="75" r="0.8" opacity="0.2"/>
    <circle cx="125" cy="82" r="0.9" opacity="0.22"/>
    <circle cx="95" cy="110" r="0.7" opacity="0.18"/>
    <circle cx="110" cy="125" r="0.8" opacity="0.21"/>
  </g>

  <!-- 隐约的其他六边形结构（其他可能性） -->
  <path d="M 130 70 L 145 78 L 145 95 L 130 103 L 115 95 L 115 78 Z"
        fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.15" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 60 115 L 75 123 L 75 140 L 60 148 L 45 140 L 45 123 Z"
        fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 145 130 L 158 137 L 158 152 L 145 159 L 132 152 L 132 137 Z"
        fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 主六边形：从混沌中结晶出的秩序 -->
  <g filter="url(#glowHex)">
    <path d="M 100 50
             L 135 70
             L 135 110
             L 100 130
             L 65 110
             L 65 70
             Z"
          fill="none"
          stroke="url(#hexGrad)"
          stroke-width="4"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- 六边形顶点：关键节点 -->
  <circle cx="100" cy="50" r="4.5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="135" cy="70" r="3" fill="#E07A5F" opacity="0.8"/>
  <circle cx="135" cy="110" r="3" fill="#E07A5F" opacity="0.8"/>
  <circle cx="100" cy="130" r="4.5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="65" cy="110" r="3" fill="#E07A5F" opacity="0.8"/>
  <circle cx="65" cy="70" r="3" fill="#E07A5F" opacity="0.8"/>

  <!-- 中心点 -->
  <circle cx="100" cy="90" r="5" fill="#E07A5F" opacity="0.9"/>
</svg>