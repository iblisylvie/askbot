<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mobiusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#E07A5F;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glowMobius">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 散沙背景 -->
  <g fill="#E07A5F" opacity="0.32">
    <circle cx="25" cy="30" r="1.4" opacity="0.27"/>
    <circle cx="18" cy="55" r="1.1" opacity="0.23"/>
    <circle cx="35" cy="20" r="1.3" opacity="0.28"/>
    <circle cx="15" cy="85" r="1.2" opacity="0.25"/>
    <circle cx="28" cy="110" r="1" opacity="0.21"/>
    <circle cx="20" cy="140" r="1.2" opacity="0.26"/>
    <circle cx="32" cy="170" r="1.1" opacity="0.24"/>
    <circle cx="45" cy="185" r="1" opacity="0.22"/>

    <circle cx="175" cy="25" r="1.3" opacity="0.29"/>
    <circle cx="188" cy="50" r="1.1" opacity="0.25"/>
    <circle cx="165" cy="75" r="1.2" opacity="0.27"/>
    <circle cx="182" cy="100" r="1" opacity="0.23"/>
    <circle cx="178" cy="130" r="1.3" opacity="0.28"/>
    <circle cx="188" cy="160" r="1.1" opacity="0.24"/>
    <circle cx="172" cy="185" r="1.2" opacity="0.26"/>

    <circle cx="70" cy="18" r="1" opacity="0.2"/>
    <circle cx="100" cy="12" r="1.2" opacity="0.24"/>
    <circle cx="130" cy="18" r="1" opacity="0.22"/>
    <circle cx="150" cy="35" r="1.1" opacity="0.25"/>
    <circle cx="60" cy="180" r="1.2" opacity="0.27"/>
    <circle cx="100" cy="188" r="1.3" opacity="0.29"/>
    <circle cx="140" cy="182" r="1.1" opacity="0.25"/>
    <circle cx="158" cy="165" r="1" opacity="0.22"/>

    <circle cx="55" cy="60" r="0.9" opacity="0.18"/>
    <circle cx="145" cy="55" r="0.8" opacity="0.17"/>
    <circle cx="150" cy="145" r="0.9" opacity="0.19"/>
    <circle cx="50" cy="150" r="0.8" opacity="0.17"/>
  </g>

  <!-- 隐约的其他环状结构 -->
  <ellipse cx="130" cy="70" rx="25" ry="15" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.12" transform="rotate(-30 130 70)"/>
  <ellipse cx="70" cy="140" rx="30" ry="18" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.1" transform="rotate(20 70 140)"/>
  <path d="M 140 130 Q 160 100, 150 70" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.13" stroke-linecap="round"/>

  <!-- 主莫比乌斯环：单侧曲面 -->
  <g filter="url(#glowMobius)">
    <!-- 环的后半部分（淡） -->
    <path d="M 55 100
             C 55 55, 95 40, 125 55
             C 155 70, 155 110, 130 125
             C 105 140, 85 120, 75 110"
          fill="none"
          stroke="#E07A5F"
          stroke-width="2"
          opacity="0.35"
          stroke-linecap="round"/>

    <!-- 环的前半部分（亮） -->
    <path d="M 75 110
             C 65 95, 75 65, 100 65
             C 135 65, 145 95, 135 110
             C 125 125, 100 135, 75 130
             C 55 125, 55 105, 75 90
             C 95 75, 120 85, 115 100"
          fill="none"
          stroke="url(#mobiusGrad)"
          stroke-width="5"
          stroke-linecap="round"/>
  </g>

  <!-- 莫比乌斯环上的节点：暗示单侧遍历 -->
  <circle cx="75" cy="90" r="4.5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="115" cy="100" r="4" fill="#E07A5F" opacity="0.9"/>
  <circle cx="135" cy="110" r="3.5" fill="#E07A5F" opacity="0.85"/>
  <circle cx="100" cy="65" r="3" fill="#E07A5F" opacity="0.75"/>
  <circle cx="130" cy="125" r="3.5" fill="#E07A5F" opacity="0.8"/>

  <!-- 中心交汇点 -->
  <circle cx="100" cy="100" r="3" fill="#E07A5F" opacity="0.7"/>
</svg>