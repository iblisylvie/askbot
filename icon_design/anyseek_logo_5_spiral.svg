<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spiralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#E07A5F;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glowSpiral">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 散沙背景 -->
  <g fill="#E07A5F" opacity="0.3">
    <circle cx="30" cy="35" r="1.3" opacity="0.28"/>
    <circle cx="20" cy="60" r="1.1" opacity="0.24"/>
    <circle cx="40" cy="25" r="1.2" opacity="0.26"/>
    <circle cx="15" cy="90" r="1.4" opacity="0.31"/>
    <circle cx="25" cy="120" r="1" opacity="0.22"/>
    <circle cx="35" cy="150" r="1.2" opacity="0.27"/>
    <circle cx="20" cy="170" r="1.1" opacity="0.25"/>

    <circle cx="170" cy="30" r="1.3" opacity="0.29"/>
    <circle cx="185" cy="55" r="1.1" opacity="0.24"/>
    <circle cx="165" cy="85" r="1.2" opacity="0.27"/>
    <circle cx="180" cy="115" r="1" opacity="0.23"/>
    <circle cx="175" cy="145" r="1.3" opacity="0.3"/>
    <circle cx="185" cy="175" r="1.1" opacity="0.26"/>

    <circle cx="65" cy="20" r="1" opacity="0.21"/>
    <circle cx="95" cy="15" r="1.2" opacity="0.25"/>
    <circle cx="125" cy="22" r="1" opacity="0.22"/>
    <circle cx="140" cy="40" r="1.1" opacity="0.24"/>
    <circle cx="155" cy="165" r="1.2" opacity="0.28"/>
    <circle cx="130" cy="180" r="1" opacity="0.23"/>
    <circle cx="100" cy="185" r="1.1" opacity="0.25"/>
    <circle cx="70" cy="175" r="1" opacity="0.22"/>

    <circle cx="55" cy="50" r="0.9" opacity="0.19"/>
    <circle cx="145" cy="55" r="0.8" opacity="0.18"/>
    <circle cx="150" cy="130" r="0.9" opacity="0.2"/>
    <circle cx="50" cy="135" r="0.8" opacity="0.17"/>
    <circle cx="100" cy="155" r="0.9" opacity="0.19"/>
  </g>

  <!-- 其他螺线（潜在可能性） -->
  <path d="M 160 120
           C 150 100, 130 90, 115 95
           S 95 115, 105 130
           S 135 145, 150 135"
        fill="none"
        stroke="#E07A5F"
        stroke-width="1.5"
        opacity="0.12"
        stroke-linecap="round"/>

  <path d="M 50 150
           C 60 130, 85 120, 100 130
           S 115 155, 100 165"
        fill="none"
        stroke="#E07A5F"
        stroke-width="1.5"
        opacity="0.15"
        stroke-linecap="round"/>

  <!-- 主黄金螺线（从外向内求索） -->
  <g filter="url(#glowSpiral)">
    <path d="M 160 160
             C 160 120, 120 80, 80 80
             S 20 120, 40 150
             S 100 160, 110 130
             S 85 95, 65 105
             S 55 135, 75 140
             S 95 125, 88 115
             S 70 115, 75 125"
          fill="none"
          stroke="url(#spiralGrad)"
          stroke-width="4"
          stroke-linecap="round"/>
  </g>

  <!-- 螺线路径上的节点 -->
  <circle cx="160" cy="160" r="5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="80" cy="80" r="3.5" fill="#E07A5F" opacity="0.8"/>
  <circle cx="40" cy="150" r="3" fill="#E07A5F" opacity="0.75"/>
  <circle cx="110" cy="130" r="3.5" fill="#E07A5F" opacity="0.8"/>
  <circle cx="65" cy="105" r="3" fill="#E07A5F" opacity="0.75"/>
  <circle cx="75" cy="140" r="2.5" fill="#E07A5F" opacity="0.7"/>
  <circle cx="75" cy="125" r="4" fill="#E07A5F" opacity="0.9"/>
</svg>