<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#E07A5F;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 散沙：随机分布的半透明小点 -->
  <g opacity="0.4">
    <circle cx="30" cy="45" r="2" fill="#E07A5F" opacity="0.6"/>
    <circle cx="55" cy="30" r="1.5" fill="#E07A5F" opacity="0.5"/>
    <circle cx="80" cy="25" r="2" fill="#E07A5F" opacity="0.4"/>
    <circle cx="120" cy="35" r="1.8" fill="#E07A5F" opacity="0.5"/>
    <circle cx="160" cy="50" r="2.2" fill="#E07A5F" opacity="0.6"/>
    <circle cx="170" cy="80" r="1.5" fill="#E07A5F" opacity="0.4"/>
    <circle cx="165" cy="120" r="2" fill="#E07A5F" opacity="0.5"/>
    <circle cx="150" cy="155" r="1.8" fill="#E07A5F" opacity="0.6"/>
    <circle cx="110" cy="170" r="2" fill="#E07A5F" opacity="0.4"/>
    <circle cx="70" cy="165" r="1.5" fill="#E07A5F" opacity="0.5"/>
    <circle cx="35" cy="140" r="2.2" fill="#E07A5F" opacity="0.6"/>
    <circle cx="25" cy="100" r="1.8" fill="#E07A5F" opacity="0.4"/>
    <circle cx="45" cy="70" r="1.2" fill="#E07A5F" opacity="0.3"/>
    <circle cx="140" cy="40" r="1.3" fill="#E07A5F" opacity="0.3"/>
    <circle cx="155" cy="95" r="1" fill="#E07A5F" opacity="0.3"/>
    <circle cx="130" cy="145" r="1.4" fill="#E07A5F" opacity="0.3"/>
    <circle cx="85" cy="155" r="1.2" fill="#E07A5F" opacity="0.3"/>
    <circle cx="50" cy="115" r="1" fill="#E07A5F" opacity="0.3"/>
  </g>

  <!-- 流形结构：连续的S形曲线 -->
  <path d="M 40 60
           Q 80 60, 100 100
           T 160 140"
        fill="none"
        stroke="url(#grad1)"
        stroke-width="4"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- 流形上的亮点：表示"找到的结构" -->
  <circle cx="40" cy="60" r="5" fill="#E07A5F" opacity="0.9"/>
  <circle cx="100" cy="100" r="4" fill="#E07A5F" opacity="0.8"/>
  <circle cx="160" cy="140" r="5" fill="#E07A5F" opacity="0.9"/>

  <!-- 次要流形：更淡的平行线 -->
  <path d="M 50 80
           Q 85 80, 100 110
           T 150 150"
        fill="none"
        stroke="#E07A5F"
        stroke-width="2"
        opacity="0.3"
        stroke-linecap="round"/>
</svg>