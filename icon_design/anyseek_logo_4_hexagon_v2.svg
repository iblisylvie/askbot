<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGradV2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#E07A5F;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glowHexV2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 混沌沙粒：大面积随机分布，真正无序 -->
  <g fill="#E07A5F">
    <!-- 左上区域密集 -->
    <circle cx="15" cy="25" r="1.5" opacity="0.35"/>
    <circle cx="35" cy="15" r="1.2" opacity="0.28"/>
    <circle cx="25" cy="40" r="1.4" opacity="0.32"/>
    <circle cx="45" cy="30" r="1" opacity="0.25"/>
    <circle cx="12" cy="55" r="1.3" opacity="0.3"/>
    <circle cx="55" cy="22" r="1.6" opacity="0.38"/>
    <circle cx="28" cy="70" r="1.1" opacity="0.27"/>
    <circle cx="8" cy="80" r="1.4" opacity="0.33"/>
    <circle cx="48" cy="85" r="0.9" opacity="0.22"/>
    <circle cx="20" cy="95" r="1.2" opacity="0.29"/>
    <circle cx="62" cy="45" r="1" opacity="0.24"/>
    <circle cx="5" cy="110" r="1.5" opacity="0.31"/>
    <circle cx="38" cy="108" r="1.1" opacity="0.26"/>
    <circle cx="18" cy="125" r="1.3" opacity="0.28"/>
    <circle cx="52" cy="118" r="0.9" opacity="0.21"/>

    <!-- 右上区域密集 -->
    <circle cx="145" cy="18" r="1.6" opacity="0.36"/>
    <circle cx="165" cy="28" r="1.2" opacity="0.27"/>
    <circle cx="180" cy="22" r="1.4" opacity="0.3"/>
    <circle cx="158" cy="38" r="1.1" opacity="0.26"/>
    <circle cx="188" cy="45" r="1.8" opacity="0.4"/>
    <circle cx="172" cy="55" r="1" opacity="0.23"/>
    <circle cx="195" cy="65" r="1.3" opacity="0.32"/>
    <circle cx="152" cy="68" r="1" opacity="0.25"/>
    <circle cx="185" cy="78" r="1.2" opacity="0.29"/>
    <circle cx="168" cy="88" r="0.9" opacity="0.22"/>
    <circle cx="140" cy="75" r="1.1" opacity="0.27"/>
    <circle cx="192" cy="95" r="1.4" opacity="0.34"/>
    <circle cx="148" cy="98" r="1" opacity="0.24"/>
    <circle cx="175" cy="108" r="1.2" opacity="0.28"/>
    <circle cx="188" cy="118" r="0.9" opacity="0.21"/>

    <!-- 左下区域密集 -->
    <circle cx="22" cy="140" r="1.5" opacity="0.33"/>
    <circle cx="8" cy="155" r="1.1" opacity="0.27"/>
    <circle cx="42" cy="148" r="1.4" opacity="0.3"/>
    <circle cx="15" cy="170" r="1.2" opacity="0.29"/>
    <circle cx="48" cy="165" r="1" opacity="0.24"/>
    <circle cx="28" cy="182" r="1.3" opacity="0.31"/>
    <circle cx="55" cy="178" r="0.9" opacity="0.23"/>
    <circle cx="5" cy="188" r="1.1" opacity="0.26"/>
    <circle cx="38" cy="188" r="1" opacity="0.25"/>
    <circle cx="62" cy="155" r="1.2" opacity="0.28"/>
    <circle cx="12" cy="145" r="0.8" opacity="0.2"/>

    <!-- 右下区域密集 -->
    <circle cx="158" cy="142" r="1.6" opacity="0.35"/>
    <circle cx="182" cy="135" r="1.2" opacity="0.28"/>
    <circle cx="170" cy="158" r="1.4" opacity="0.32"/>
    <circle cx="148" cy="165" r="1.1" opacity="0.26"/>
    <circle cx="192" cy="152" r="1.3" opacity="0.3"/>
    <circle cx="162" cy="175" r="1" opacity="0.24"/>
    <circle cx="185" cy="170" r="1.2" opacity="0.27"/>
    <circle cx="175" cy="188" r="1.5" opacity="0.33"/>
    <circle cx="195" cy="180" r="1" opacity="0.25"/>
    <circle cx="142" cy="180" r="1.1" opacity="0.28"/>
    <circle cx="155" cy="155" r="0.9" opacity="0.22"/>

    <!-- 中心区域也散布沙粒 -->
    <circle cx="75" cy="55" r="1.2" opacity="0.25"/>
    <circle cx="125" cy="48" r="1" opacity="0.22"/>
    <circle cx="85" cy="85" r="0.9" opacity="0.2"/>
    <circle cx="115" cy="75" r="1.1" opacity="0.24"/>
    <circle cx="95" cy="105" r="0.8" opacity="0.18"/>
