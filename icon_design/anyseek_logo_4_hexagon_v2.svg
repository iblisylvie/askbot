    <circle cx="110" cy="140" r="0.9" opacity="0.2"/>
    <circle cx="100" cy="155" r="1.1" opacity="0.24"/>
  </g>

  <!-- 隐约的其他六边形结构（其他潜在可能性） -->
  <path d="M 140 65 L 158 75 L 158 95 L 140 105 L 122 95 L 122 75 Z"
        fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 45 125 L 63 135 L 63 155 L 45 165 L 27 155 L 27 135 Z"
        fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.1" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 155 145 L 170 153 L 170 170 L 155 178 L 140 170 L 140 153 Z"
        fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 主六边形：从混沌中结晶出的秩序 -->
  <g filter="url(#glowHexV2)">
    <path d="M 100 45
             L 138 67
             L 138 112
             L 100 134
             L 62 112
             L 62 67
             Z"
          fill="none"
          stroke="url(#hexGradV2)"
          stroke-width="4.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- 六边形顶点 -->
  <circle cx="100" cy="45" r="5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="138" cy="67" r="3.5" fill="#E07A5F" opacity="0.82"/>
  <circle cx="138" cy="112" r="3.5" fill="#E07A5F" opacity="0.82"/>
  <circle cx="100" cy="134" r="5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="62" cy="112" r="3.5" fill="#E07A5F" opacity="0.82"/>
  <circle cx="62" cy="67" r="3.5" fill="#E07A5F" opacity="0.82"/>

  <!-- 中心点 -->
  <circle cx="100" cy="89.5" r="5.5" fill="#E07A5F" opacity="0.9"/>
</svg>