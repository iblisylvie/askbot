    <!-- Path 3 -->
    <path d="M 200 200 Q 170 195 145 210 T 125 245 T 120 285 T 130 325"
          stroke="#E07A5F" stroke-width="1" fill="none"/>
    <circle cx="170" cy="195" r="2" fill="#E07A5F"/>
    <circle cx="145" cy="210" r="2" fill="#E07A5F"/>
    <circle cx="125" cy="245" r="2" fill="#E07A5F"/>
    <circle cx="120" cy="285" r="2" fill="#E07A5F"/>
  </g>

  <!-- Main golden spiral path with glow -->
  <g filter="url(#glow)">
    <!-- Golden spiral following Fibonacci sequence -->
    <path d="M 200 200
             Q 210 190 220 190
             Q 230 190 235 195
             Q 240 200 240 210
             Q 240 225 230 235
             Q 215 245 200 245
             Q 175 245 160 230
             Q 145 215 145 190
             Q 145 155 170 130
             Q 195 105 230 105
             Q 275 105 305 135
             Q 335 165 335 210
             Q 335 265 295 305
             Q 255 345 200 345
             Q 130 345 80 295
             Q 30 245 30 175"
          stroke="url(#spiralGradient)"
          stroke-width="3"
          fill="none"
          filter="url(#inkWash)"/>

    <!-- Flying white strokes at the end (calligraphy effect) -->
    <path d="M 30 175 Q 25 165 22 155"
          stroke="#E07A5F"
          stroke-width="2.5"
          stroke-linecap="round"
          fill="none"
          opacity="0.6"/>
    <path d="M 30 175 Q 28 185 27 195"
          stroke="#E07A5F"
          stroke-width="2"
          stroke-linecap="round"
          fill="none"
          opacity="0.5"/>
  </g>

  <!-- Main path nodes (decreasing size along spiral) -->
  <g fill="url(#spiralGradient)">
    <circle cx="200" cy="200" r="5" opacity="0.95"/>
    <circle cx="220" cy="190" r="4.5" opacity="0.93"/>
    <circle cx="235" cy="195" r="4" opacity="0.91"/>
