    <circle cx="230" cy="105" r="2.3" opacity="0.77"/>
    <circle cx="305" cy="135" r="2" opacity="0.75"/>
    <circle cx="335" cy="210" r="1.8" opacity="0.73"/>
    <circle cx="295" cy="305" r="1.5" opacity="0.71"/>
    <circle cx="200" cy="345" r="1.3" opacity="0.69"/>
