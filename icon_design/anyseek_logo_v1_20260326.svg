  <!-- Potential paths layer: 3 alternate spirals with small nodes -->
  <g opacity="0.18">
    <!-- Path 1 -->
    <path d="M 200 200 Q 220 180 240 185 T 270 200 T 290 230 T 295 270"
          stroke="#E07A5F" stroke-width="1" fill="none"/>
    <circle cx="220" cy="180" r="2" fill="#E07A5F"/>
    <circle cx="240" cy="185" r="2" fill="#E07A5F"/>
    <circle cx="270" cy="200" r="2" fill="#E07A5F"/>
    <circle cx="290" cy="230" r="2" fill="#E07A5F"/>

    <!-- Path 2 -->
    <path d="M 200 200 Q 190 220 185 250 T 195 290 T 220 315 T 255 325"
          stroke="#E07A5F" stroke-width="1" fill="none"/>
    <circle cx="190" cy="220" r="2" fill="#E07A5F"/>
    <circle cx="185" cy="250" r="2" fill="#E07A5F"/>
    <circle cx="195" cy="290" r="2" fill="#E07A5F"/>
