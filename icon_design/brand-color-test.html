<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>新品牌色测试 - Minimal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 70px; padding-bottom: 80px;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  .slide {
    width: 540px; height: 720px;
    position: relative; overflow: hidden;
    border-radius: 8px; margin-bottom: 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .bg-dark { position: absolute; inset: 0; background: #282828; }
  .bg-dark::after {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 80% 15%, rgba(255,255,255,0.03) 0%, transparent 50%),
      radial-gradient(circle at 20% 85%, rgba(0,0,0,0.08) 0%, transparent 50%);
  }
  .bg-light { position: absolute; inset: 0; background: #fffdfe; }
  .bg-light::after {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(224,122,95,0.03) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(40,40,40,0.02) 0%, transparent 40%);
  }
  .content { position: absolute; inset: 0; padding: 28px; display: flex; flex-direction: column; z-index: 2; }
  .brand-tag {
    position: absolute; top: 22px; left: 28px;
    display: flex; align-items: center; gap: 8px; z-index: 3;
  }
  .brand-tag svg { width: 22px; height: 22px; }
  .brand-tag span { font-size: 12px; font-weight: 600; letter-spacing: 1px; }
  .brand-tag.on-dark span { color: rgba(255,255,255,0.4); }
  .brand-tag.on-light span { color: rgba(40,40,40,0.35); }
  .page-num { position: absolute; bottom: 22px; right: 28px; font-size: 12px; z-index: 3; }
  .page-num.on-dark { color: rgba(255,255,255,0.15); }
  .page-num.on-light { color: rgba(40,40,40,0.18); }
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(17,17,17,0.95); backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 20px; display: flex; align-items: center;
    justify-content: center; gap: 12px;
  }
  .toolbar .btn {
    background: #282828; color: #fffdfe; border: none;
    padding: 9px 22px; border-radius: 7px; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  .toolbar .btn.red { background: #E07A5F; }
  .toolbar .progress { font-size: 13px; color: rgba(255,255,255,0.4); min-width: 100px; }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn red" onclick="downloadAll()">⬇ 全部下载 ZIP</button>
  <button class="btn" onclick="downloadCurrent()">下载当前</button>
  <span class="progress" id="progress">共 2 张</span>
</div>

<!-- 第1页：封面（暗底） -->
<div class="slide">
  <div class="bg-dark"></div>
  <!-- Logo -->
  <div class="brand-tag on-dark">
    <svg viewBox="0 0 32 32" fill="none">
      <defs>
        <linearGradient id="spiralGrad1" x1="50%" y1="50%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#E07A5F"/>
          <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.7"/>
        </linearGradient>
      </defs>
      <path d="M 16 16 Q 17 15 18 15 Q 19 15 19.5 16 Q 20 17 19 18.5 Q 17.5 19.5 16 19.5 Q 13.5 19.5 12 18 Q 10.5 16.5 10.5 14 Q 10.5 11 12.5 9 Q 14.5 7 17.5 7 Q 21.5 7 24 9.5 Q 26.5 12 26.5 16 Q 26.5 21 23 24.5"
            stroke="url(#spiralGrad1)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="16" r="2" fill="#E07A5F"/>
      <circle cx="19" cy="18.5" r="1.3" fill="#E07A5F" opacity="0.8"/>
      <circle cx="12" cy="18" r="1.1" fill="#E07A5F" opacity="0.7"/>
      <circle cx="12.5" cy="9" r="0.9" fill="#E07A5F" opacity="0.6"/>
      <circle cx="24" cy="9.5" r="0.8" fill="#E07A5F" opacity="0.5"/>
    </svg>
  </div>
  <div class="page-num on-dark">1/2</div>
  <div class="content" style="justify-content:center; padding: 48px 40px;">
    <div style="font-size:12px;color:#E07A5F;letter-spacing:3px;font-weight:700;margin-bottom:18px;text-align:center;">TEST 2025.03</div>
    <div style="font-size:48px;font-weight:900;color:#fffdfe;line-height:1.2;text-align:center;margin-bottom:8px;">新品牌色<br>测试页</div>
    <div style="font-size:20px;font-weight:500;color:rgba(255,253,254,0.4);text-align:center;margin-bottom:0;">Minimal · 珊瑚橙 · 黑白灰</div>
    <div style="width:48px;height:3px;background:#E07A5F;border-radius:2px;margin:22px auto;"></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;gap:12px;padding:9px 13px;border-radius:7px;background:rgba(255,255,255,0.05);">
        <span style="font-size:16px;">🎨</span>
        <span style="font-size:13px;color:rgba(255,255,255,0.7);">暗底：#282828 黑灰</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding:9px 13px;border-radius:7px;background:rgba(255,255,255,0.05);">
        <span style="font-size:16px;">✨</span>
        <span style="font-size:13px;color:rgba(255,255,255,0.7);">浅底：#fffdfe 米白</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding:9px 13px;border-radius:7px;background:rgba(255,255,255,0.05);">
        <span style="font-size:16px;">🔥</span>
        <span style="font-size:13px;color:rgba(255,255,255,0.7);">强调：#E07A5F 珊瑚橙</span>
      </div>
    </div>
  </div>
</div>

<!-- 第2页：数字卡（浅底） -->
<div class="slide">
  <div class="bg-light"></div>
  <!-- Logo -->
  <div class="brand-tag on-light">
    <svg viewBox="0 0 32 32" fill="none">
      <defs>
        <linearGradient id="spiralGrad2" x1="50%" y1="50%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#E07A5F"/>
          <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.7"/>
        </linearGradient>
      </defs>
      <path d="M 16 16 Q 17 15 18 15 Q 19 15 19.5 16 Q 20 17 19 18.5 Q 17.5 19.5 16 19.5 Q 13.5 19.5 12 18 Q 10.5 16.5 10.5 14 Q 10.5 11 12.5 9 Q 14.5 7 17.5 7 Q 21.5 7 24 9.5 Q 26.5 12 26.5 16 Q 26.5 21 23 24.5"
            stroke="url(#spiralGrad2)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="16" r="2" fill="#E07A5F"/>
      <circle cx="19" cy="18.5" r="1.3" fill="#E07A5F" opacity="0.8"/>
      <circle cx="12" cy="18" r="1.1" fill="#E07A5F" opacity="0.7"/>
      <circle cx="12.5" cy="9" r="0.9" fill="#E07A5F" opacity="0.6"/>
      <circle cx="24" cy="9.5" r="0.8" fill="#E07A5F" opacity="0.5"/>
    </svg>
  </div>
  <div class="page-num on-light">2/2</div>
  <div class="content" style="padding-top:58px;">
    <div style="font-size:11px;color:#E07A5F;letter-spacing:2px;font-weight:700;margin-bottom:7px;">KEY METRICS</div>
    <div style="font-size:26px;font-weight:900;color:#282828;line-height:1.3;margin-bottom:4px;">关键数据</div>
    <div style="font-size:13px;color:#888;margin-bottom:18px;">新配色下的数字展示效果</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      <div style="background:#282828;border-radius:11px;padding:17px 13px;">
        <div style="font-size:38px;font-weight:900;color:#E07A5F;line-height:1;">10万+</div>
        <div style="font-size:11px;color:rgba(255,253,254,0.45);margin-top:5px;">活跃用户</div>
      </div>
      <div style="background:#282828;border-radius:11px;padding:17px 13px;">
        <div style="font-size:38px;font-weight:900;color:#E07A5F;line-height:1;">4.9</div>
        <div style="font-size:11px;color:rgba(255,253,254,0.45);margin-top:5px;">用户评分</div>
      </div>
      <div style="background:#282828;border-radius:11px;padding:17px 13px;">
        <div style="font-size:38px;font-weight:900;color:#E07A5F;line-height:1;">50+</div>
        <div style="font-size:11px;color:rgba(255,253,254,0.45);margin-top:5px;">覆盖城市</div>
      </div>
      <div style="background:#282828;border-radius:11px;padding:17px 13px;">
        <div style="font-size:38px;font-weight:900;color:#E07A5F;line-height:1;">99%</div>
        <div style="font-size:11px;color:rgba(255,253,254,0.45);margin-top:5px;">好评率</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
const SCALE = 2;
const TITLE = 'brand-test';
async function renderSlide(s) {
  return html2canvas(s, { scale: SCALE, useCORS: true, backgroundColor: null, width: 540, height: 720, logging: false });
}
function toBlob(c) { return new Promise(r => c.toBlob(r, 'image/png')); }
async function downloadAll() {
  const slides = document.querySelectorAll('.slide');
  const p = document.getElementById('progress');
  const zip = new JSZip();
  for (let i = 0; i < slides.length; i++) {
    p.textContent = `渲染 ${i+1}/${slides.length}...`;
    zip.file(`${TITLE}-${String(i+1).padStart(2,'0')}.png`, await toBlob(await renderSlide(slides[i])));
  }
  p.textContent = '打包中...';
  saveAs(await zip.generateAsync({type:'blob'}), `${TITLE}-小红书.zip`);
  p.textContent = `✓ ${slides.length} 张已下载`;
}
async function downloadCurrent() {
  const slides = document.querySelectorAll('.slide');
  const vc = window.innerHeight / 2;
  let idx = 0, min = Infinity;
  slides.forEach((s, i) => { const d = Math.abs(s.getBoundingClientRect().top + 360 - vc); if (d < min) { min = d; idx = i; } });
  const p = document.getElementById('progress');
  p.textContent = '渲染中...';
  saveAs(await toBlob(await renderSlide(slides[idx])), `${TITLE}-${String(idx+1).padStart(2,'0')}.png`);
  p.textContent = `✓ 第 ${idx+1} 张已下载`;
}
</script>
</body>
</html>
