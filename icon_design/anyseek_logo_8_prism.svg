<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="prismGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="refractGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.7" />
    </linearGradient>
    <filter id="glowPrism">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 散沙背景：未折射前的混沌 -->
  <g fill="#E07A5F" opacity="0.35">
    <!-- 左侧密集区 -->
    <circle cx="25" cy="50" r="1.5" opacity="0.3"/>
    <circle cx="20" cy="75" r="1.3" opacity="0.27"/>
    <circle cx="35" cy="35" r="1.4" opacity="0.32"/>
    <circle cx="18" cy="100" r="1.2" opacity="0.26"/>
    <circle cx="28" cy="125" r="1.1" opacity="0.24"/>
    <circle cx="22" cy="150" r="1.3" opacity="0.29"/>
    <circle cx="32" cy="170" r="1" opacity="0.22"/>
    <circle cx="45" cy="30" r="1.2" opacity="0.25"/>
    <circle cx="15" cy="60" r="1.1" opacity="0.23"/>

    <circle cx="50" cy="45" r="1" opacity="0.2"/>
    <circle cx="45" cy="85" r="1.2" opacity="0.26"/>
    <circle cx="55" cy="115" r="1" opacity="0.21"/>
    <circle cx="48" cy="145" r="1.1" opacity="0.24"/>
    <circle cx="58" cy="165" r="0.9" opacity="0.19"/>
    <circle cx="40" cy="185" r="1" opacity="0.22"/>

    <!-- 顶部区域 -->
    <circle cx="85" cy="25" r="1.3" opacity="0.28"/>
    <circle cx="115" cy="20" r="1.2" opacity="0.25"/>
    <circle cx="145" cy="28" r="1.1" opacity="0.24"/>

    <!-- 底部区域 -->
    <circle cx="80" cy="180" r="1" opacity="0.21"/>
    <circle cx="120" cy="175" r="1.1" opacity="0.23"/>
    <circle cx="150" cy="185" r="1" opacity="0.2"/>
  </g>

  <!-- 其他可能的结构（折射前的其他形态） -->
  <circle cx="140" cy="60" r="20" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.1"/>
  <path d="M 155 100 L 175 80 L 185 110 Z" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.12"/>
  <ellipse cx="165" cy="145" rx="20" ry="12" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.1" transform="rotate(30 165 145)"/>

  <!-- 三棱镜：将混沌转化为秩序的工具 -->
  <g filter="url(#glowPrism)">
    <!-- 棱镜主体 -->
    <path d="M 70 70
             L 130 50
             L 110 140
             Z"
          fill="none"
          stroke="url(#prismGrad)"
          stroke-width="4"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- 内部折射线 -->
    <line x1="70" y1="70" x2="100" y2="95" stroke="#E07A5F" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="130" y1="50" x2="100" y2="95" stroke="#E07A5F" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="110" y1="140" x2="100" y2="95" stroke="#E07A5F" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- 折射出的有序结构（从棱镜射出） -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- 主折射光线 -->
    <path d="M 110 140
             Q 140 165, 170 160"
          fill="none"
          stroke="url(#refractGrad)"
          stroke-width="5"
          opacity="0.9"/>

    <!-- 次级折射线 -->
    <path d="M 110 140
             Q 135 175, 160 180"
          fill="none"
          stroke="#E07A5F"
          stroke-width="3"
          opacity="0.6"/>

    <path d="M 110 140
             Q 150 155, 180 145"
          fill="none"
          stroke="#E07A5F"
          stroke-width="2.5"
          opacity="0.5"/>
  </g>

  <!-- 节点：折射的关键点 -->
  <circle cx="70" cy="70" r="4" fill="#E07A5F" opacity="0.85"/>
  <circle cx="130" cy="50" r="4" fill="#E07A5F" opacity="0.85"/>
  <circle cx="110" cy="140" r="5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="100" cy="95" r="3" fill="#E07A5F" opacity="0.7"/>

  <!-- 折射终点的光点 -->
  <circle cx="170" cy="160" r="3.5" fill="#E07A5F" opacity="0.9"/>
  <circle cx="160" cy="180" r="2.5" fill="#E07A5F" opacity="0.75"/>
  <circle cx="180" cy="145" r="2.5" fill="#E07A5F" opacity="0.75"/>
</svg>