<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="treeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#E07A5F;stop-opacity:0.75" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.5" />
    </linearGradient>
    <filter id="glowTree">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 散沙背景 -->
  <g fill="#E07A5F" opacity="0.3">
    <circle cx="20" cy="35" r="1.3" opacity="0.26"/>
    <circle cx="15" cy="60" r="1.1" opacity="0.22"/>
    <circle cx="30" cy="20" r="1.2" opacity="0.25"/>
    <circle cx="12" cy="90" r="1" opacity="0.2"/>
    <circle cx="22" cy="120" r="1.2" opacity="0.24"/>
    <circle cx="18" cy="150" r="1.1" opacity="0.23"/>
    <circle cx="28" cy="178" r="1" opacity="0.21"/>

    <circle cx="180" cy="30" r="1.3" opacity="0.27"/>
    <circle cx="188" cy="55" r="1.1" opacity="0.23"/>
    <circle cx="172" cy="80" r="1.2" opacity="0.26"/>
    <circle cx="185" cy="110" r="1" opacity="0.22"/>
    <circle cx="178" cy="140" r="1.3" opacity="0.25"/>
    <circle cx="188" cy="170" r="1.1" opacity="0.24"/>
    <circle cx="175" cy="185" r="1" opacity="0.2"/>

    <circle cx="55" cy="15" r="1.2" opacity="0.24"/>
    <circle cx="85" cy="12" r="1" opacity="0.21"/>
    <circle cx="115" cy="15" r="1.1" opacity="0.23"/>
    <circle cx="145" cy="20" r="1.2" opacity="0.25"/>
    <circle cx="158" cy="40" r="1" opacity="0.2"/>
    <circle cx="50" cy="185" r="1.2" opacity="0.26"/>
    <circle cx="150" cy="180" r="1.1" opacity="0.24"/>

    <circle cx="60" cy="55" r="0.9" opacity="0.18"/>
    <circle cx="140" cy="60" r="0.8" opacity="0.17"/>
    <circle cx="130" cy="145" r="0.9" opacity="0.19"/>
    <circle cx="70" cy="140" r="0.8" opacity="0.17"/>
    <circle cx="100" cy="160" r="1" opacity="0.22"/>

    <circle cx="40" cy="100" r="0.9" opacity="0.18"/>
    <circle cx="160" cy="95" r="0.8" opacity="0.16"/>
    <circle cx="120" cy="120" r="0.7" opacity="0.15"/>
    <circle cx="80" cy="115" r="0.8" opacity="0.17"/>
  </g>

  <!-- 其他分支结构（淡色） -->
  <g fill="none" stroke="#E07A5F" stroke-width="1.5" stroke-linecap="round">
    <!-- 左侧分支 -->
    <path d="M 55 160 Q 40 120, 35 90" opacity="0.12"/>
    <path d="M 40 120 Q 25 110, 20 95" opacity="0.1"/>
    <path d="M 40 120 Q 30 130, 25 140" opacity="0.1"/>

    <!-- 右侧分支 -->
    <path d="M 145 155 Q 160 115, 165 85" opacity="0.12"/>
    <path d="M 160 115 Q 175 105, 180 90" opacity="0.1"/>
    <path d="M 160 115 Q 170 125, 175 135" opacity="0.1"/>

    <!-- 顶部散枝 -->
    <path d="M 85 75 Q 70 50, 65 35" opacity="0.13"/>
    <path d="M 115 70 Q 130 45, 135 30" opacity="0.13"/>
  </g>

  <!-- 主分支路径：主干到选择的探索线 -->
  <g filter="url(#glowTree)">
    <!-- 主树干 -->
    <path d="M 100 175
             Q 95 140, 100 115
             Q 105 90, 100 70"
          fill="none"
          stroke="url(#treeGrad)"
          stroke-width="5"
          stroke-linecap="round"/>

    <!-- 主分支1 -->
    <path d="M 100 115
             Q 75 95, 55 75"
          fill="none"
          stroke="#E07A5F"
          stroke-width="3.5"
          opacity="0.85"
          stroke-linecap="round"/>

    <!-- 主分支2 -->
    <path d="M 100 115
             Q 125 95, 145 80"
          fill="none"
          stroke="#E07A5F"
          stroke-width="3.5"
          opacity="0.85"
          stroke-linecap="round"/>

    <!-- 细分支 -->
    <path d="M 55 75
             Q 45 60, 40 45"
          fill="none"
          stroke="#E07A5F"
          stroke-width="2.5"
          opacity="0.7"
          stroke-linecap="round"/>
    <path d="M 55 75
             Q 70 55, 80 40"
          fill="none"
          stroke="#E07A5F"
          stroke-width="2.5"
          opacity="0.7"
          stroke-linecap="round"/>
    <path d="M 145 80
             Q 160 60, 165 40"
          fill="none"
          stroke="#E07A5F"
          stroke-width="2.5"
          opacity="0.7"
          stroke-linecap="round"/>
    <path d="M 145 80
             Q 135 55, 125 38"
          fill="none"
          stroke="#E07A5F"
          stroke-width="2.5"
          opacity="0.7"
          stroke-linecap="round"/>
  </g>

  <!-- 节点：每个探索阶段的发现 -->
  <circle cx="100" cy="175" r="5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="100" cy="115" r="4" fill="#E07A5F" opacity="0.9"/>
  <circle cx="55" cy="75" r="3.5" fill="#E07A5F" opacity="0.85"/>
  <circle cx="145" cy="80" r="3.5" fill="#E07A5F" opacity="0.85"/>
  <circle cx="40" cy="45" r="3" fill="#E07A5F" opacity="0.8"/>
  <circle cx="80" cy="40" r="3" fill="#E07A5F" opacity="0.8"/>
  <circle cx="165" cy="40" r="3" fill="#E07A5F" opacity="0.8"/>
  <circle cx="125" cy="38" r="3" fill="#E07A5F" opacity="0.8"/>
  <circle cx="100" cy="70" r="2.5" fill="#E07A5F" opacity="0.75"/>
</svg>