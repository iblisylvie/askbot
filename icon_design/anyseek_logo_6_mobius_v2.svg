  <!-- 其他潜在结构（淡色） -->
  <ellipse cx="65" cy="75" rx="22" ry="14" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.1" transform="rotate(-20 65 75)"/>
  <ellipse cx="145" cy="165" rx="25" ry="16" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.1" transform="rotate(30 145 165)"/>

  <!-- 莫比乌斯环：明显的单侧曲面扭转结构 -->
  <g filter="url(#glowMobiusV2)">
    <!-- 环的后半部分（被遮挡部分，更淡更细） -->
    <path d="M 65 145
             C 45 125, 45 85, 70 70
             C 95 55, 130 65, 145 85"
          fill="none"
          stroke="#E07A5F"
          stroke-width="2"
          opacity="0.25"
          stroke-linecap="round"/>

    <!-- 交叉点附近的过渡 -->
    <path d="M 145 85
             C 160 105, 155 130, 140 140"
          fill="none"
          stroke="#E07A5F"
          stroke-width="2.5"
          opacity="0.35"
          stroke-linecap="round"/>

    <!-- 环的前半部分（主体，更亮更粗） -->
    <!-- 下半部分 -->
    <path d="M 65 145
             C 85 160, 115 155, 135 140
             C 155 125, 160 95, 145 75
             C 130 55, 95 50, 75 65
             C 55 80, 50 110, 60 130
             C 70 150, 100 148, 115 135"
          fill="none"
          stroke="url(#mobiusGradV2)"
          stroke-width="6"
          stroke-linecap="round"/>

    <!-- 上半部分（完成扭转） -->
    <path d="M 115 135
             C 135 118, 138 90, 125 72
             C 112 54, 85 52, 70 68"
          fill="none"
          stroke="url(#mobiusGradV2)"
          stroke-width="5"
          opacity="0.85"
          stroke-linecap="round"/>
  </g>

  <!-- 扭转交叉点标记 -->
  <circle cx="90" cy="100" r="3" fill="#E07A5F" opacity="0.6"/>

  <!-- 莫比乌斯环上的关键节点 -->
  <circle cx="65" cy="145" r="5" fill="#E07A5F" opacity="0.95"/>
  <circle cx="145" cy="75" r="4.5" fill="#E07A5F" opacity="0.9"/>
  <circle cx="75" cy="65" r="4" fill="#E07A5F" opacity="0.85"/>
  <circle cx="135" cy="140" r="4" fill="#E07A5F" opacity="0.85"/>
  <circle cx="115" cy="135" r="3.5" fill="#E07A5F" opacity="0.8"/>
  <circle cx="125" cy="72" r="3" fill="#E07A5F" opacity="0.75"/>
</svg>