  <!-- 其他潜在螺线（3条，带节点） -->
  <path d="M 45 145
           C 55 125, 80 115, 95 125
           S 108 150, 92 158"
        fill="none"
        stroke="#E07A5F"
        stroke-width="2"
        opacity="0.22"
        stroke-linecap="round"/>
  <circle cx="95" cy="125" r="2" fill="#E07A5F" opacity="0.35"/>
  <circle cx="92" cy="158" r="1.5" fill="#E07A5F" opacity="0.3"/>

  <path d="M 155 140
           C 145 120, 125 110, 112 118
           S 98 145, 108 160"
        fill="none"
        stroke="#E07A5F"
        stroke-width="2"
        opacity="0.2"
        stroke-linecap="round"/>
  <circle cx="112" cy="118" r="2" fill="#E07A5F" opacity="0.32"/>
  <circle cx="108" cy="160" r="1.5" fill="#E07A5F" opacity="0.28"/>

  <path d="M 145 55
           C 135 75, 115 85, 102 78
           S 88 52, 98 40"
        fill="none"
        stroke="#E07A5F"
        stroke-width="2"
        opacity="0.18"
        stroke-linecap="round"/>
  <circle cx="102" cy="78" r="2" fill="#E07A5F" opacity="0.3"/>
  <circle cx="98" cy="40" r="1.5" fill="#E07A5F" opacity="0.25"/>

  <!-- 主螺线：向外求索（从内向外），东方书法意境 -->
  <g filter="url(#softGlow)">
    <!-- 主体：由内向外螺旋 -->
    <path d="M 75 125
             C 55 125, 50 105, 60 90
             S 90 75, 105 85
             S 125 115, 110 135
             S 70 145, 50 125
             S 35 75, 60 50
             S 115 35, 145 60
             S 170 115, 145 145
             S 85 170, 45 145"
          fill="none"
          stroke="url(#spiralGradV3)"
          stroke-width="5"
          stroke-linecap="round"/>

    <!-- 东方意境：飞白收笔，减至2道，似墨迹飘洒 -->
    <path d="M 45 145
             Q 32 152, 22 158
             M 45 145
             Q 35 162, 28 172"
          fill="none"
          stroke="#E07A5F"
          stroke-width="1.5"
          opacity="0.45"
          stroke-linecap="round"/>
  </g>

  <!-- 节点：仍在路上 -->
  <!-- 起点：最大最浓（墨点晕染感） -->
  <g filter="url(#inkGlow)">
    <circle cx="75" cy="125" r="8" fill="#E07A5F" opacity="0.9"/>
    <circle cx="75" cy="125" r="5" fill="#E07A5F" opacity="0.6"/>
  </g>

  <!-- 途中节点：渐小渐淡 -->
  <circle cx="60" cy="90" r="4" fill="#E07A5F" opacity="0.82"/>
  <circle cx="105" cy="85" r="3.5" fill="#E07A5F" opacity="0.78"/>
  <circle cx="110" cy="135" r="3" fill="#E07A5F" opacity="0.72"/>
  <circle cx="60" cy="50" r="2.8" fill="#E07A5F" opacity="0.68"/>
  <circle cx="145" cy="60" r="2.5" fill="#E07A5F" opacity="0.65"/>
  <circle cx="145" cy="145" r="2" fill="#E07A5F" opacity="0.55"/>

  <!-- 终点：小而开放，暗示仍在继续 -->
  <circle cx="45" cy="145" r="1.8" fill="#E07A5F" opacity="0.45"/>

  <!-- 东方意境：点缀的小墨点 -->
  <circle cx="28" cy="165" r="1.2" fill="#E07A5F" opacity="0.35"/>
  <circle cx="32" cy="170" r="0.9" fill="#E07A5F" opacity="0.28"/>
  <circle cx="22" cy="158" r="1" fill="#E07A5F" opacity="0.25"/>
