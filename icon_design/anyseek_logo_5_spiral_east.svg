<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spiralGradV3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#E07A5F;stop-opacity:0.75" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.4" />
    </linearGradient>
    <filter id="inkGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feOffset in="blur" dx="0.5" dy="0.5" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 混沌沙粒：均匀随机分布全图 -->
  <g fill="#E07A5F">
    <!-- 边缘及四角 -->
    <circle cx="18" cy="28" r="1.4" opacity="0.32"/>
