<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="spiralGrad" x1="50%" y1="50%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E07A5F"/>
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0.75"/>
    </linearGradient>
  </defs>

  <!-- Simplified golden spiral -->
  <path d="M 16 16
           Q 17 15 18 15
           Q 19 15 19.5 16
           Q 20 17 19 18.5
           Q 17.5 19.5 16 19.5
           Q 13.5 19.5 12 18
           Q 10.5 16.5 10.5 14
           Q 10.5 11 12.5 9
           Q 14.5 7 17.5 7
           Q 21.5 7 24 9.5
           Q 26.5 12 26.5 16
           Q 26.5 21 23 24.5
           Q 19 28 14 28"
        stroke="url(#spiralGrad)"
        stroke-width="1.8"
        fill="none"
        stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#E07A5F"/>

  <!-- Key nodes along spiral -->
  <circle cx="19" cy="18.5" r="1.2" fill="#E07A5F" opacity="0.8"/>
  <circle cx="12" cy="18" r="1" fill="#E07A5F" opacity="0.7"/>
  <circle cx="12.5" cy="9" r="0.8" fill="#E07A5F" opacity="0.6"/>
  <circle cx="24" cy="9.5" r="0.7" fill="#E07A5F" opacity="0.5"/>
</svg>
