<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E07A5F;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- 中心吸引子 -->
  <ellipse cx="100" cy="100" rx="12" ry="8" fill="#E07A5F" opacity="0.9"/>

  <!-- 螺旋向外扩散的点云 - 模拟吸引子轨迹 -->
  <g fill="#E07A5F">
    <!-- 内层轨道 -->
    <circle cx="85" cy="90" r="2.5" opacity="0.8"/>
    <circle cx="115" cy="92" r="2.2" opacity="0.75"/>
    <circle cx="110" cy="110" r="2" opacity="0.7"/>
    <circle cx="90" cy="112" r="2.3" opacity="0.75"/>
    <circle cx="80" cy="100" r="2" opacity="0.7"/>
    <circle cx="120" cy="105" r="1.8" opacity="0.65"/>

    <!-- 中层轨道 -->
    <circle cx="65" cy="80" r="2" opacity="0.6"/>
    <circle cx="135" cy="85" r="1.8" opacity="0.55"/>
    <circle cx="140" cy="115" r="2.2" opacity="0.6"/>
    <circle cx="125" cy="135" r="2" opacity="0.55"/>
    <circle cx="75" cy="130" r="1.8" opacity="0.5"/>
    <circle cx="55" cy="105" r="2" opacity="0.55"/>
    <circle cx="145" cy="95" r="1.5" opacity="0.5"/>
    <circle cx="105" cy="145" r="1.8" opacity="0.5"/>

    <!-- 外层轨道 - 更混沌 -->
    <circle cx="45" cy="65" r="1.5" opacity="0.45"/>
    <circle cx="155" cy="70" r="1.3" opacity="0.4"/>
    <circle cx="160" cy="125" r="1.6" opacity="0.45"/>
    <circle cx="130" cy="155" r="1.4" opacity="0.4"/>
    <circle cx="70" cy="150" r="1.5" opacity="0.4"/>
    <circle cx="40" cy="120" r="1.2" opacity="0.35"/>
    <circle cx="50" cy="45" r="1" opacity="0.3"/>
    <circle cx="150" cy="50" r="1.2" opacity="0.35"/>
    <circle cx="165" cy="100" r="1" opacity="0.3"/>
    <circle cx="100" cy="165" r="1.3" opacity="0.35"/>
    <circle cx="35" cy="90" r="0.9" opacity="0.25"/>
    <circle cx="60" cy="35" r="0.8" opacity="0.25"/>
    <circle cx="140" cy="40" r="0.9" opacity="0.25"/>
    <circle cx="170" cy="140" r="0.8" opacity="0.2"/>
    <circle cx="95" cy="175" r="0.9" opacity="0.25"/>
  </g>

  <!-- 连接轨迹线 - 暗示确定性混沌 -->
  <path d="M 85 90 Q 60 70, 45 65" fill="none" stroke="#E07A5F" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <path d="M 115 92 Q 140 80, 155 70" fill="none" stroke="#E07A5F" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <path d="M 110 110 Q 135 130, 160 125" fill="none" stroke="#E07A5F" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <path d="M 90 112 Q 65 125, 40 120" fill="none" stroke="#E07A5F" stroke-width="1" opacity="0.25" stroke-linecap="round"/>

  <!-- 内层螺旋线 -->
  <path d="M 100 100 m -15,0 a 15,12 0 1,1 30,0 a 15,12 0 1,1 -30,0"
        fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>